<!DOCTYPE html>
<html>
<head>
    <title>Rooms</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h2 class="logo">Pahinga</h2>
    <a href="index.html">← Back</a>
    <div>
    <span id="userDisplay"></span>
    <button onclick="logout()" class="btn">Logout</button>
    </div>
</nav>

<section class="section">
    <h1>Choose Your Room</h1>

    <div class="room-flex">
        <img src="assets/standard.jpg" class="room-img">
        <div class="room-info">
            <h3><b>Standard Room</b></h3>
            <p>₱1,500 / night</p>
            <button onclick="selectRoom('Standard',1500)">Check In</button>
        </div>
    </div>

    <div class="room-flex">
        <img src="assets/deluxe.jpg" class="room-img">
        <div class="room-info">
            <h3><b>Deluxe Room</b></h3>
            <p>₱3,000 / night</p>
            <button onclick="selectRoom('Deluxe',3000)">Check In</button>
        </div>
    </div>

    <div class="room-flex">
        <img src="assets/suite.jpg" class="room-img">
        <div class="room-info">
            <h3><b>Suite Room</b></h3>
            <p>₱5,000 / night</p>
            <button onclick="selectRoom('Suite',5000)">Check In</button>
        </div>
    </div>

</section>

<script src="js/booking.js"></script>
</body>
</html>
